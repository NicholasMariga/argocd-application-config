apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-argo-application
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/NicholasMariga/argocd-application-config.git
    targetRevision: HEAD
    path: dev2
  destination: 
    server: https://kubernetes.default.svc
    namespace: dev2app

  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true