apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
  namespace: 3tier
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head>
        <title>Mariga 3-Tier App</title>
        <style>
          body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; background: #f0f0f0; }
          h1 { color: #2c3e50; }
          .tier { background: white; margin: 10px auto; padding: 15px; width: 400px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
          button { background: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
          #response { margin-top: 20px; color: green; font-weight: bold; }
        </style>
      </head>
      <body>
        <h1>Hello Mariga, K8s is fun with ArgoCD</h1>
        <div class="tier">Frontend: Nginx</div>
        <div class="tier">Backend: Python/Flask</div>
        <div class="tier">Database: PostgreSQL</div>
        <br>
        <button onclick="callBackend()">Test Backend Connection</button>
        <div id="response"></div>
        <script>
          function callBackend() {
            fetch('/api/health')
              .then(res => res.json())
              .then(data => {
                document.getElementById('response').innerText = data.message;
              })
              .catch(() => {
                document.getElementById('response').innerText = 'Backend not reachable';
              });
          }
        </script>
      </body>
    </html>

  nginx.conf: |
    server {
      listen 80;
      location / {
        root /usr/share/nginx/html;
        index index.html;
      }
      location /api/ {
        proxy_pass http://flask-service:5000/;   # ← proxies API calls to Flask
        proxy_set_header Host $host;
      }
    }