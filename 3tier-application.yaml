apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-3tier-application
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/NicholasMariga/argocd-application-config.git
    targetRevision: HEAD
    path: 3tier
  destination:
    server: https://kubernetes.default.svc
    namespace: 3tier

  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true