apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-myapp
  namespace: apache-myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apache-myapp
  template:
    metadata:
      labels:
        app: apache-myapp 
    spec:
      containers:
      - name: apache-myapp
        image: httpd:2.4          # ← official Apache image on Docker Hub
        ports:
        - containerPort: 80